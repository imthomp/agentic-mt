# QE-vs-human-judgment meta-evaluation for low-resource language pairs.
# See configs/schema.md for the required-field convention this extends.

language_pair: "ha-en+km-en+ps-en+xh-zu+zu-xh"  # multi-pair experiment
model_name: "existing_wmt_da_system_outputs"    # translations are pre-existing WMT
                                                  # participant submissions (mostly
                                                  # open-source MT systems), not
                                                  # generated by this pipeline
sample_size: full
random_seed: 42
data_source: "RicardoRei/wmt-da-human-evaluation (via multilingual-mqm-benchmark results cache)"
output_dir: results/qe_wmt_da_low_resource

# Pipeline-specific fields
mqmbench_root: /home/it238/projects/multilingual-mqm-benchmark/multilingual-mqm-benchmark
target_langs: [ha, km, ps, xh, zu]
qe_metric: cometkiwi          # reference-free COMET-KIWI
reference_metrics: [comet, chrf]
n_bootstrap: 1000

# xh/zu are labeled "medium" resource by mqmbench's own tier classification,
# but are genuinely low-resource in practice — noting that distinction here.
resource_tier_notes:
  ha: "low resource (mqmbench tier: low)"
  km: "low resource (mqmbench tier: low)"
  ps: "low resource (mqmbench tier: low)"
  xh: "low resource in practice (mqmbench tier: medium)"
  zu: "low resource in practice (mqmbench tier: medium)"
